<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            color: var(--vscode-foreground);
            padding: 10px 12px;
            margin: 0;
            line-height: 1.4;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .username {
            font-size: 0.75em;
            opacity: 0.6;
        }

        .refresh {
            background: none;
            border: none;
            color: var(--vscode-foreground);
            opacity: 0.35;
            cursor: pointer;
            font-size: 1em;
            padding: 0;
            line-height: 1;
            transition: all 0.2s ease;
        }
        .refresh:hover { opacity: 1; }

        .summary {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .box {
            flex: 1;
            background: var(--vscode-editor-inactiveSelectionBackground);
            border-radius: 3px;
            padding: 5px 8px;
        }

        .box-label {
            text-align: center;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.5;
            padding-bottom: 5px;
        }

        .box-value {
            font-size: 0.8em;
            font-weight: 600;
            text-align: center;
        }

        .section {margin-bottom: 10px;}
        .section-title {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.45;
            margin-bottom: 4px;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .item-name {
            flex-shrink: 0;
            font-size: 0.8em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: 0.9;
        }
        .item-time {
            font-size: 0.75em;
            opacity: 0.6;
            text-align: right;
            flex-shrink: 0;
        }

    </style>
</head>
<body>
    <div id="root"><span class="muted">Loading...</span></div>
    <script>
        const vscode = acquireVsCodeApi()

        function esc(s) {
            return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
        }

        function items(array, useColor) {
            arr = array.filter(item => item.total_seconds >= 600)
            if (!arr || !arr.length) return '<span class="muted">No data</span>';
            return arr.map(item => {
                const fill = useColor && item.useColor
                ? `style="width:${item.percent}%;background:${esc(item.color)}"`
                : `style="width:${item.percent}%"`
                return `<div class="item">
                            <span class="item-name" title="${esc(item.name)}">${esc(item.name)}</span>
                            <div class="bar-track"><div class="bar-fill" ${fill}></div></div>
                            <span class="item-time">${esc(item.text)}</span>   
                        </div>`;
            }).join("");
        }

        function render(d) {
            document.getElementById("root").innerHTML = `
                <div class="header">
                    <span class="username">${esc(d.username)}</span>
                    <button class="refresh" id="refresh" title="Refresh">↻</button>
                </div>

                <div class="summary">
                    <div class="box">
                        <div class="box-label">TODAY</div>
                        <div class="box-value">${esc(d.time_today ?? "no time")}</div>    
                    </div>
                    <div class="box">
                        <div class="box-label">ALLTIME</div>
                        <div class="box-value">${esc(d.time_all ?? "no time")}</div>    
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Projects: Today</div>
                    ${items(d.proj_today.slice(0, 16), false)}
                </div>

                <div class="section">
                    <div class="section-title">Projects: All Time</div>
                    ${items(d.projects.slice(0, 16), false)}
                </div>

                <div class="section">
                    <div class="section-title">Languages: All Time</div>
                    ${items(d.languages.slice(0, 16), true)}
                </div>
            `

            document.getElementById("refresh").addEventListener("click", () => {
                vscode.postMessage({ command: "refresh" })
            })
        }

        window.addEventListener("message", (e) => {
            const { command, data, message } = e.data
            if (command === "data") render(data)
            else if (command === "error")
                document.getElementById("root").innerHTML = `<span class="error">${esc(message)}</span`
        })

        vscode.postMessage({ command: "ready" })
    </script>
</body>
</html>
